name: Build Windows Wheels

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Build Tools
        run: python -m pip install -U pip cibuildwheel

      - name: Install GSL via vcpkg
        run: |
          & "$env:VCPKG_INSTALLATION_ROOT\vcpkg.exe" install gsl:x64-windows
        shell: pwsh

      - name: Build Wheels
        run: python -m cibuildwheel --platform windows

      - name: Upload Wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-windows
          path: wheelhouse/*.whl
